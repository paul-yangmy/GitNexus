# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=analyze:10m rate=10r/h;

upstream api_backend {
    server api-server:4747;
}

# HTTP → HTTPS redirect (uncomment for production)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen 443 ssl;

    server_name _;

    # TLS — replace with real certs in production
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Client upload limit (zip uploads)
    client_max_body_size 512M;

    # Proxy timeouts (long SSE connections)
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Analyze endpoint — strict rate limit
    location ~ ^/api/platform/projects/[^/]+/analyze$ {
        limit_req zone=analyze burst=2 nodelay;
        proxy_pass http://api_backend;
    }

    # API routes
    location /api/ {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://api_backend;

        # SSE / WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
    }

    # Frontend + static files (served by api-server)
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://api_backend;
    }
}
